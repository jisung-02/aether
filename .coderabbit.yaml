# .coderabbit.yaml
language: "ko-KR"

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: true
  review_status: true
  collapse_walkthrough: false
  
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
      - develop

chat:
  auto_reply: true

tone_instructions: |
  - Gleam 언어의 관용구와 모범 사례에 집중해주세요
  - 패턴 매칭 사용의 적절성을 검토해주세요
  - Result/Option 처리를 확인해주세요
  - 타입 안전성과 타입 추론을 검증해주세요
  - 적절한 에러 처리를 확인해주세요
  - 함수형 프로그래밍 개선 사항을 제안해주세요
  - 모든 리뷰는 한글로 작성해주세요