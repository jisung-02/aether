gleam_erlang = ">= 0.26.0 and < 1.0.0"
gleam_json = ">= 1.0.1 and < 2.0.0"
mist = ">= 2.0.0 and < 3.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"